name: clinic_connect
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_storage: ^13.0.6

  # SVG
  flutter_svg: ^2.0.10

  # Network
  dio: ^5.3.3
  connectivity_plus: ^7.0.0
  internet_connection_checker: ^1.0.0

  # Local Storage
  sqflite: ^2.3.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2

  # Dependency Injection
  get_it: ^9.2.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  dartz: ^0.10.1
  path: ^1.9.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4

  # UI
  google_fonts: ^8.0.1
  font_awesome_flutter: ^10.12.0

  # Splash
  flutter_native_splash: ^2.4.1

  # JS interop fix
  js: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.7

# ─── Native Splash Configuration ─────────────────────────────────────────────
# After editing this block run:  dart run flutter_native_splash:create
flutter_native_splash:
  # Solid background — matches the Flutter SplashScreen exactly so there
  # is zero visual jump between the platform splash and the Flutter layer.
  color: "#1A3C2E"

  # Centre image shown during the native splash (optional).
  # Uncomment once you have a logo PNG at this path:
  # image: assets/images/splash_logo.png

  # Dark-mode overrides (optional — same green keeps it consistent)
  # color_dark: "#1A3C2E"
  # image_dark: assets/images/splash_logo.png

  # Hold the native splash open until FlutterNativeSplash.remove() is called.
  # Without this the platform splash disappears the moment Flutter draws its
  # first frame, which can expose a blank scaffold background.
  fullscreen: true

  # Android 12+ uses a separate SplashScreen API with its own icon circle.
  # icon_background_color must be set or Android defaults it to white.
  android_12:
    color: "#1A3C2E"
    icon_background_color: "#1A3C2E"
    # image: assets/images/splash_logo.png

# ─── Flutter ──────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/svg/medical_care.svg
    - assets/svg/connected_world.svg
    - assets/svg/cloud_sync.svg
    # Uncomment when you add a logo image:
    # - assets/images/splash_logo.png