name: clinic_connect
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_storage: ^13.0.6

  # SVG
  flutter_svg: ^2.0.10

  # Network
  dio: ^5.3.3
  connectivity_plus: ^7.0.0
  internet_connection_checker: ^1.0.0

  # Local Storage
  sqflite: ^2.3.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2

  # Dependency Injection
  get_it: ^9.2.0

  # Utils
  intl: ^0.20.2  # YOUR VERSION - STAYS THE SAME
  uuid: ^4.2.1
  dartz: ^0.10.1
  path: ^1.9.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4

  # UI
  google_fonts: ^8.0.1
  font_awesome_flutter: ^10.12.0

  # PREMIUM DASHBOARD PACKAGES - 100% COMPATIBLE WITH YOUR SETUP
  fl_chart: ^0.66.0  # Beautiful charts - NO CONFLICTS with intl ^0.20.2
  
  # Export functionality (optional)
  pdf: ^3.10.8
  printing: ^5.11.1
  share_plus: ^7.2.0
  csv: ^5.0.2

  # Splash
  flutter_native_splash: ^2.4.1

  # JS interop fix
  js: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.7

# ─── Native Splash Configuration ─────────────────────────────────────────────
flutter_native_splash:
  color: "#1A3C2E"
  fullscreen: true

  android_12:
    color: "#1A3C2E"
    icon_background_color: "#1A3C2E"

# ─── Flutter ──────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/svg/medical_care.svg
    - assets/svg/connected_world.svg
    - assets/svg/cloud_sync.svg